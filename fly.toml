app = "codegraph-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3847"
  REPO_PATH = "/repo"
  MCP_TRANSPORT = "sse"

[http_service]
  internal_port = 3847
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
